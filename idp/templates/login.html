<!DOCTYPE html>
<html>

<head>
    <title>Mock Identity Provider</title>
</head>

<body>

<h2>Mock Identity Provider</h2>

<form method="POST" action="/login">

    <label>Username</label><br>
    <input
        type="text"
        name="username"
        required
    ><br><br>

    <label>Password</label><br>
    <input
        type="password"
        name="password"
        required
    ><br><br>

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
